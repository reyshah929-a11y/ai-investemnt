name: Run Alpaca ML Bot

on:
  schedule:
    # Runs at minutes 0, 15, 30, and 45 of every hour from 10:00 AM to 4:45 PM EST, Mon-Fri
    - cron: '0,15,30,45 14-20 * * 1-5'
  workflow_dispatch: # Allows manual runs anytime
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install alpaca-py pandas scikit-learn yfinance

      - name: Run script
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python alpaca_ml_trader.py
