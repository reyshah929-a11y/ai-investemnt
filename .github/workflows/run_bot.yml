name: Run Alpaca ML Bot

on:
  schedule:
    # Runs every hour from 10:30 AM to 4:30 PM EST, Monday through Friday
    - cron: '30 14-20 * * 1-5'
  workflow_dispatch: # Keeps the manual run button active too!
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install alpaca-py pandas scikit-learn yfinance

      - name: Run script
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python alpaca_ml_trader.py
